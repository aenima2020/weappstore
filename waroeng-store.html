<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WG Store">
<meta name="theme-color" content="#0a0a12">
<title>Waroeng Game Store</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a12;--sf:#12111f;--card:#181730;--card2:#1f1e38;--bd:#272550;--teal:#1ec8c8;--purple:#8b5cf6;--gold:#ffb800;--red:#ff4560;--green:#00e676;--text:#e8e6f2;--sub:#6e6c90;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;}
::-webkit-scrollbar{width:0;}
.screen{display:none;height:100%;flex-direction:column;overflow:hidden;}.screen.active{display:flex;}
/* Login */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;gap:18px;}
.login-title{font-size:1.3rem;font-weight:900;letter-spacing:.16em;color:var(--teal);}
.login-sub{font-size:.7rem;color:var(--sub);font-weight:600;letter-spacing:.08em;}
.pin-dots{display:flex;gap:14px;margin:6px 0;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bd);transition:.2s;}
.pin-dot.filled{background:var(--teal);border-color:var(--teal);box-shadow:0 0 10px rgba(30,200,200,.4);}
.pin-dot.error{border-color:var(--red);background:var(--red);animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}
.pin-pad{display:grid;grid-template-columns:repeat(3,70px);gap:10px;margin-top:6px;}
.pin-key{height:54px;border-radius:16px;background:var(--card);border:1px solid var(--bd);color:var(--text);font-size:1.2rem;font-weight:700;cursor:pointer;transition:.15s;-webkit-user-select:none;}
.pin-key:active{background:var(--teal);color:#000;transform:scale(.93);}
.pin-key.fn{font-size:.8rem;color:var(--sub);}
/* Setup */
.setup-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:14px;}
.setup-box{width:100%;max-width:380px;}
.setup-status{font-size:.68rem;padding:10px 14px;border-radius:10px;margin-top:10px;line-height:1.5;font-weight:600;display:none;}
.setup-status.ok{display:block;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.2);color:var(--green);}
.setup-status.err{display:block;background:rgba(255,69,96,.08);border:1px solid rgba(255,69,96,.2);color:var(--red);}
.setup-status.loading{display:block;background:var(--card);border:1px solid var(--bd);color:var(--sub);}
.login-gear{position:absolute;top:max(16px,env(safe-area-inset-top));right:16px;background:none;border:none;color:var(--bd);font-size:1.2rem;cursor:pointer;padding:8px;}
/* Header */
.app-hdr{padding:12px 18px;padding-top:max(12px,env(safe-area-inset-top));background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.hdr-t{font-size:.78rem;font-weight:900;letter-spacing:.1em;flex:1;}
.hdr-btn{background:none;border:none;color:var(--sub);padding:6px;cursor:pointer;font-size:1rem;border-radius:10px;}
.hdr-btn:active{color:var(--teal);}
/* Cart badge */
.cart-badge{position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;font-size:.5rem;font-weight:900;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
/* Tabs */
.tab-bar{display:flex;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;}
.tab-btn{flex:1;padding:11px 6px;text-align:center;font-size:.65rem;font-weight:800;color:var(--sub);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;letter-spacing:.03em;position:relative;}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);}
.tab-c{display:none;flex:1;flex-direction:column;overflow:hidden;}.tab-c.active{display:flex;}
.tab-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px;padding-bottom:max(14px,env(safe-area-inset-bottom));}
/* Input */
.inp{width:100%;padding:12px 14px;border-radius:12px;background:var(--card);border:1.5px solid var(--bd);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.84rem;font-weight:600;outline:none;-webkit-appearance:none;}
.inp:focus{border-color:var(--teal);}
.inp::placeholder{color:var(--sub);}
/* Search */
.search-bar{padding:10px 16px;border-bottom:1px solid var(--bd);flex-shrink:0;}
/* Game card */
.g-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:.15s;}
.g-card:active{border-color:var(--teal);background:var(--card2);}
.g-name{font-size:.84rem;font-weight:800;}
.g-meta{font-size:.62rem;color:var(--sub);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
.g-badge{font-size:.52rem;font-weight:900;padding:2px 7px;border-radius:5px;letter-spacing:.04em;}
.g-badge.size{background:rgba(30,200,200,.1);color:var(--teal);border:1px solid rgba(30,200,200,.2);}
.g-badge.genre{background:rgba(139,92,246,.1);color:var(--purple);border:1px solid rgba(139,92,246,.2);}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-sheet{background:var(--sf);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto 0;}
.modal-hdr{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--bd);}
.modal-title{flex:1;font-size:.85rem;font-weight:900;}
.modal-close{background:var(--card);border:none;color:var(--sub);width:32px;height:32px;border-radius:50%;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 18px;padding-bottom:max(16px,env(safe-area-inset-bottom));}
.d-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bd);font-size:.78rem;}
.d-row:last-child{border-bottom:none;}
.d-label{color:var(--sub);font-weight:700;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;}
.d-val{font-weight:700;text-align:right;max-width:60%;word-break:break-word;}
/* Buttons */
.btn{padding:13px 20px;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:800;cursor:pointer;border:none;transition:.15s;letter-spacing:.05em;width:100%;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none;}
.btn-teal{background:var(--teal);color:#000;}.btn-teal:active{background:#2ee0e0;}
.btn-purple{background:var(--purple);color:#fff;}
.btn-red{background:rgba(255,69,96,.12);color:var(--red);border:1px solid rgba(255,69,96,.25);}
.btn-outline{background:none;border:1.5px solid var(--bd);color:var(--sub);}
.btn-outline:active{border-color:var(--teal);color:var(--teal);}
.btn.loading{color:transparent;position:relative;}.btn.loading::after{content:'';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:inherit;border-radius:inherit;}
/* Cart item */
.cart-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;}
.cart-item .g-name{flex:1;font-size:.8rem;}
.cart-rm{background:none;border:none;color:var(--red);font-size:1rem;cursor:pointer;padding:4px 8px;}
/* History */
.h-item{padding:12px 16px;border-bottom:1px solid var(--bd);}
.h-email{font-size:.78rem;font-weight:800;}
.h-meta{font-size:.6rem;color:var(--sub);margin-top:2px;display:flex;gap:8px;}
.h-badge{font-size:.5rem;font-weight:900;padding:2px 6px;border-radius:4px;}
.h-badge.ok{background:rgba(0,230,118,.1);color:var(--green);border:1px solid rgba(0,230,118,.2);}
.h-badge.ban{background:rgba(255,69,96,.1);color:var(--red);border:1px solid rgba(255,69,96,.2);}
/* Stats */
.stats{padding:8px 16px;font-size:.62rem;font-weight:700;color:var(--sub);border-bottom:1px solid var(--bd);flex-shrink:0;}
/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:.78rem;font-weight:600;}
/* Toast */
.toast{position:fixed;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%) translateY(-100px);padding:12px 22px;border-radius:14px;font-size:.76rem;font-weight:800;z-index:999;opacity:0;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .25s;pointer-events:none;max-width:90vw;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{background:var(--teal);color:#000;}.toast.err{background:var(--red);color:#fff;}
/* Loading spinner inline */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
</style>
</head>
<body>

<!-- SETUP -->
<div class="screen" id="scrSetup">
<div class="setup-wrap">
<div class="login-title">WAROENG STORE</div>
<div class="login-sub">SETUP</div>
<div class="setup-box">
<div style="font-size:.8rem;font-weight:700;margin-bottom:12px;">Paste URL Apps Script:</div>
<input class="inp" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec" style="font-size:.75rem;">
<div class="setup-status" id="setupSt"></div>
<button class="btn btn-teal" onclick="testUrl()" id="btnTest" style="margin-top:12px;">TES KONEKSI & SIMPAN</button>
</div>
</div>
</div>

<!-- LOGIN -->
<div class="screen" id="scrLogin">
<button class="login-gear" onclick="showSetup()">⚙</button>
<div class="login-wrap">
<div class="login-title">WAROENG STORE</div>
<div class="login-sub">ADMIN PANEL</div>
<div class="pin-dots" id="pinDots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
<div style="font-size:.66rem;color:var(--sub);font-weight:600;">Masukkan PIN Admin</div>
<div class="pin-pad">
<button class="pin-key" onclick="pp('1')">1</button><button class="pin-key" onclick="pp('2')">2</button><button class="pin-key" onclick="pp('3')">3</button>
<button class="pin-key" onclick="pp('4')">4</button><button class="pin-key" onclick="pp('5')">5</button><button class="pin-key" onclick="pp('6')">6</button>
<button class="pin-key" onclick="pp('7')">7</button><button class="pin-key" onclick="pp('8')">8</button><button class="pin-key" onclick="pp('9')">9</button>
<button class="pin-key fn" onclick="_pin='';updDots()">CLR</button><button class="pin-key" onclick="pp('0')">0</button><button class="pin-key fn" onclick="_pin=_pin.slice(0,-1);updDots()">⌫</button>
</div>
</div>
</div>

<!-- MAIN -->
<div class="screen" id="scrMain">
<div class="app-hdr">
<div class="hdr-t">WAROENG STORE</div>
<button class="hdr-btn" onclick="refreshGames()">↻</button>
<button class="hdr-btn" onclick="logout()">⏻</button>
</div>
<div class="tab-bar">
<button class="tab-btn active" id="tb0" onclick="stab(0)">🎮 Store</button>
<button class="tab-btn" id="tb1" onclick="stab(1)" style="position:relative;">🛒 Cart <span class="cart-badge" id="cartBadge" style="display:none;">0</span></button>
<button class="tab-btn" id="tb2" onclick="stab(2)">📋 History</button>
<button class="tab-btn" id="tb3" onclick="stab(3)">⛔ Revoke</button>
</div>

<!-- STORE -->
<div class="tab-c active" id="tc0">
<div class="search-bar"><input class="inp" id="gameSearch" placeholder="Cari game..." oninput="renderGames()" style="font-size:.8rem;"></div>
<div class="stats" id="gameStats">Memuat...</div>
<div class="tab-scroll" id="gameList"><div class="empty">Memuat katalog game...</div></div>
</div>

<!-- CART -->
<div class="tab-c" id="tc1">
<div class="tab-scroll" id="cartArea">
<div style="margin-bottom:14px;">
<div style="font-size:.65rem;font-weight:800;color:var(--sub);letter-spacing:.1em;margin-bottom:10px;">KERANJANG</div>
<div id="cartList"><div class="empty">Keranjang kosong</div></div>
</div>
<div style="margin-top:16px;">
<div style="font-size:.65rem;font-weight:800;color:var(--sub);letter-spacing:.1em;margin-bottom:6px;">EMAIL PEMBELI</div>
<input class="inp" id="sendEmail" placeholder="email@pembeli.com" type="email">
</div>
<button class="btn btn-teal" id="btnSend" onclick="doSend()" style="margin-top:14px;" disabled>KIRIM & SHARE</button>
<div id="sendReport" style="display:none;margin-top:14px;"></div>
</div>
</div>

<!-- HISTORY -->
<div class="tab-c" id="tc2">
<div class="search-bar"><input class="inp" id="histSearch" placeholder="Cari email / game..." oninput="renderHist()" style="font-size:.8rem;"></div>
<div class="stats" id="histStats">Memuat...</div>
<div class="tab-scroll" id="histList"><div class="empty">Memuat...</div></div>
</div>

<!-- REVOKE -->
<div class="tab-c" id="tc3">
<div class="tab-scroll">
<div style="font-size:.65rem;font-weight:800;color:var(--sub);letter-spacing:.1em;margin-bottom:10px;">CABUT AKSES USER</div>
<input class="inp" id="revokeEmail" placeholder="email@user.com" type="email">
<button class="btn btn-outline" onclick="doRevokeScan()" style="margin-top:10px;">SCAN AKSES</button>
<div id="revokeResult" style="margin-top:14px;"></div>
</div>
</div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal-sheet">
<div class="modal-handle"></div>
<div class="modal-hdr"><div class="modal-title" id="mTitle">Detail</div><button class="modal-close" onclick="closeModal()">✕</button></div>
<div class="modal-body" id="mBody"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
let API='',_pin='',_adminPin='',_games=[],_cart=[],_hist=[],_tt=null;
API=localStorage.getItem('wgs_api')||'';
(function(){(API?document.getElementById('scrLogin'):document.getElementById('scrSetup')).classList.add('active')})();

// ── API ──
async function apiGet(p){if(!API)throw new Error('Setup URL dulu');const r=await fetch(API+'?'+new URLSearchParams(p),{redirect:'follow'});try{return await r.json()}catch(e){return{status:'ok',message:'OK'}}}
async function apiPost(d){if(!API)throw new Error('Setup URL dulu');try{const r=await fetch(API,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain;charset=UTF-8'},body:JSON.stringify(d)});try{return await r.json()}catch(e){return{status:'ok',message:'Request terkirim'}}}catch(e){return{status:'ok',message:'Request terkirim',_maybeOk:true}}}

// ── Setup ──
async function testUrl(){const u=document.getElementById('setupUrl').value.trim();if(!u||!u.startsWith('https://script.google.com/')){sst('err','URL tidak valid');return}
document.getElementById('btnTest').disabled=true;sst('loading','Menghubungkan...');
try{const r=await fetch(u+'?action=ping',{redirect:'follow'});const d=await r.json();if(d.status==='ok'){localStorage.setItem('wgs_api',u);API=u;sst('ok','Terhubung!');setTimeout(()=>{sw('scrSetup','scrLogin')},800)}else sst('err',d.message||'Error')}
catch(e){sst('err','Gagal: '+e.message)}document.getElementById('btnTest').disabled=false}
function sst(t,m){const e=document.getElementById('setupSt');e.className='setup-status '+t;e.textContent=m}
function showSetup(){sw(null,'scrSetup');document.getElementById('setupUrl').value=API}

// ── PIN ──
function pp(n){if(_pin.length>=4)return;_pin+=n;updDots();if(_pin.length===4)verifyPin()}
function updDots(){document.querySelectorAll('#pinDots .pin-dot').forEach((d,i)=>d.className='pin-dot'+(i<_pin.length?' filled':''))}
async function verifyPin(){try{const d=await apiGet({action:'games',pin:_pin});if(d.status==='ok'){_adminPin=_pin;_games=d.data||[];sw('scrLogin','scrMain');renderGames();toast('Selamat datang!',0)}else{pinErr('PIN salah!')}}catch(e){pinErr(e.message)}}
function pinErr(m){document.querySelectorAll('#pinDots .pin-dot').forEach(d=>d.className='pin-dot error');setTimeout(()=>{_pin='';updDots()},600);toast(m,1)}
function logout(){_pin='';_adminPin='';_games=[];_cart=[];updDots();sw('scrMain','scrLogin')}

// ── Screens ──
function sw(from,to){if(from)document.getElementById(from).classList.remove('active');document.getElementById(to).classList.add('active')}
function stab(i){document.querySelectorAll('.tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));document.querySelectorAll('.tab-c').forEach((c,j)=>c.classList.toggle('active',j===i));if(i===2)refreshHist()}

// ── Games ──
async function refreshGames(){try{const d=await apiGet({action:'games',pin:_adminPin});if(d.status==='ok'){_games=d.data||[];renderGames();toast('Katalog dimuat',0)}}catch(e){toast(e.message,1)}}
function renderGames(){const q=(document.getElementById('gameSearch').value||'').toLowerCase();const f=_games.filter(g=>!q||g.name.toLowerCase().includes(q));
document.getElementById('gameStats').textContent=f.length+' dari '+_games.length+' game';
const w=document.getElementById('gameList');if(!f.length){w.innerHTML='<div class="empty">Tidak ditemukan</div>';return}
w.innerHTML=f.map((g,i)=>'<div class="g-card" onclick="showGame(\''+esc(g.id)+'\')"><div class="g-name">'+esc(g.name)+'</div><div class="g-meta"><span class="g-badge size">'+esc(g.size)+'</span><span class="g-badge genre">'+esc(g.genre)+'</span></div></div>').join('')}

function showGame(id){const g=_games.find(x=>x.id===id);if(!g)return;
const inCart=_cart.some(c=>c.id===id);
document.getElementById('mTitle').textContent=g.name;
document.getElementById('mBody').innerHTML=
'<div class="d-row"><div class="d-label">Game ID</div><div class="d-val" style="font-size:.7rem;">'+esc(g.id)+'</div></div>'+
'<div class="d-row"><div class="d-label">Size</div><div class="d-val">'+esc(g.size)+'</div></div>'+
'<div class="d-row"><div class="d-label">Genre</div><div class="d-val">'+esc(g.genre)+'</div></div>'+
'<div class="d-row"><div class="d-label">Min Specs</div><div class="d-val" style="font-size:.7rem;">'+esc(g.min_specs)+'</div></div>'+
'<div class="d-row"><div class="d-label">Rec Specs</div><div class="d-val" style="font-size:.7rem;">'+esc(g.rec_specs)+'</div></div>'+
(g.note?'<div class="d-row"><div class="d-label">Note</div><div class="d-val" style="font-size:.7rem;">'+esc(g.note)+'</div></div>':'')+
'<div class="d-row"><div class="d-label">Mirrors</div><div class="d-val">'+((g.folder_ids||[]).length)+' server</div></div>'+
'<div style="margin-top:18px;">'+
(inCart?'<button class="btn btn-outline" disabled>Sudah di Keranjang</button>':
'<button class="btn btn-purple" onclick="addCart(\''+esc(g.id)+'\')">Tambah ke Keranjang</button>')+
'</div>';
document.getElementById('modal').classList.add('open')}

// ── Cart ──
function addCart(id){const g=_games.find(x=>x.id===id);if(!g)return;if(_cart.some(c=>c.id===id)){toast('Sudah ada di keranjang',1);return}
_cart.push({id:g.id,name:g.name,size:g.size});updCartBadge();renderCart();closeModal();toast(g.name+' ditambahkan',0)}
function rmCart(id){_cart=_cart.filter(c=>c.id!==id);updCartBadge();renderCart()}
function updCartBadge(){const b=document.getElementById('cartBadge');if(_cart.length>0){b.style.display='flex';b.textContent=_cart.length}else b.style.display='none';
document.getElementById('btnSend').disabled=_cart.length===0}
function renderCart(){const w=document.getElementById('cartList');if(!_cart.length){w.innerHTML='<div class="empty">Keranjang kosong. Tambah game dari tab Store.</div>';return}
w.innerHTML=_cart.map(c=>'<div class="cart-item"><div class="g-name">'+esc(c.name)+'</div><span class="g-badge size">'+esc(c.size)+'</span><button class="cart-rm" onclick="rmCart(\''+esc(c.id)+'\')">✕</button></div>').join('')}

// ── Send ──
async function doSend(){const email=document.getElementById('sendEmail').value.trim();if(!email||!email.includes('@')){toast('Email tidak valid',1);return}
if(!_cart.length){toast('Keranjang kosong',1);return}
const btn=document.getElementById('btnSend');btn.disabled=true;btn.classList.add('loading');btn.innerHTML='<div class="spin"></div>';
document.getElementById('sendReport').style.display='none';
try{const d=await apiPost({pin:_adminPin,action:'send',email:email,cart:_cart});
let html='<div style="background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:14px;">';
html+='<div style="font-size:.78rem;font-weight:900;margin-bottom:8px;">'+(d.message||'Selesai')+'</div>';
if(d.report){d.report.forEach(r=>{html+='<div style="font-size:.7rem;margin-bottom:4px;color:'+(r.status==='ok'?'var(--green)':'var(--red)')+';">'+(r.status==='ok'?'OK':'GAGAL')+' - '+esc(r.game)+(r.detail&&r.detail!=='Shared'?' ('+esc(r.detail)+')':'')+'</div>'})}
if(d.email_sent)html+='<div style="font-size:.68rem;color:var(--teal);margin-top:8px;">Email terkirim ke '+esc(email)+'</div>';
html+='</div>';
document.getElementById('sendReport').innerHTML=html;document.getElementById('sendReport').style.display='block';
_cart=[];updCartBadge();renderCart();document.getElementById('sendEmail').value='';
toast(d.message||'Berhasil!',0)}
catch(e){toast('Error: '+e.message,1)}
btn.disabled=false;btn.classList.remove('loading');btn.textContent='KIRIM & SHARE';updCartBadge()}

// ── History ──
async function refreshHist(){try{const d=await apiGet({action:'history',pin:_adminPin});if(d.status==='ok'){_hist=d.data||[];renderHist()}}catch(e){toast(e.message,1)}}
function renderHist(){const q=(document.getElementById('histSearch').value||'').toLowerCase();
const f=_hist.filter(h=>!q||(h.email||'').toLowerCase().includes(q)||(h.game_id||'').toLowerCase().includes(q));
document.getElementById('histStats').textContent=f.length+' dari '+_hist.length+' records';
const w=document.getElementById('histList');if(!f.length){w.innerHTML='<div class="empty">Tidak ada data</div>';return}
w.innerHTML=f.map(h=>'<div class="h-item"><div class="h-email">'+esc(h.email)+'</div><div class="h-meta"><span>'+esc(h.game_id)+'</span><span class="h-badge '+(h.status==='ACTIVE'?'ok':'ban')+'">'+esc(h.status)+'</span><span>'+esc(String(h.date).substring(0,19))+'</span></div></div>').join('')}

// ── Revoke ──
let _rvData=[];
async function doRevokeScan(){const email=document.getElementById('revokeEmail').value.trim();if(!email){toast('Masukkan email',1);return}
document.getElementById('revokeResult').innerHTML='<div class="spin" style="margin:20px auto;"></div>';
try{const d=await apiPost({pin:_adminPin,action:'revoke_scan',email:email});
if(d.status==='ok'){_rvData=d.data||[];
if(!_rvData.length){document.getElementById('revokeResult').innerHTML='<div class="empty">Tidak ada akses ditemukan untuk '+esc(email)+'</div>';return}
let h='<div style="font-size:.72rem;font-weight:800;margin-bottom:10px;">'+_rvData.length+' game ditemukan:</div>';
_rvData.forEach((r,i)=>{h+='<div class="cart-item"><div class="g-name">'+esc(r.name||r.game_id)+'</div><button class="cart-rm" style="color:var(--red);font-size:.7rem;font-weight:800;" onclick="doRevokeOne('+i+')">Cabut</button></div>'});
h+='<button class="btn btn-red" onclick="doRevokeAll()" style="margin-top:10px;">CABUT SEMUA ('+_rvData.length+')</button>';
document.getElementById('revokeResult').innerHTML=h}else toast(d.message,1)}catch(e){toast(e.message,1)}}

async function doRevokeOne(i){const r=_rvData[i];if(!r)return;if(!confirm('Cabut akses '+r.name+'?'))return;
try{const d=await apiPost({pin:_adminPin,action:'revoke_exec',email:document.getElementById('revokeEmail').value.trim(),game_ids:[r.game_id]});toast(d.message||'Dicabut',0);doRevokeScan()}catch(e){toast(e.message,1)}}
async function doRevokeAll(){if(!confirm('Cabut SEMUA akses?'))return;const ids=_rvData.map(r=>r.game_id);
try{const d=await apiPost({pin:_adminPin,action:'revoke_exec',email:document.getElementById('revokeEmail').value.trim(),game_ids:ids});toast(d.message||'Semua dicabut',0);doRevokeScan()}catch(e){toast(e.message,1)}}

// ── Utils ──
function closeModal(){document.getElementById('modal').classList.remove('open')}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m,err){const t=document.getElementById('toast');clearTimeout(_tt);t.textContent=m;t.className='toast show '+(err?'err':'ok');_tt=setTimeout(()=>t.classList.remove('show'),3000)}
</script>
